      .card img {

  <script>
    // Disable Right Click
    document.addEventListener("contextmenu", function(e) {
        e.preventDefault();
    });

    // Disable DevTools shortcuts
    document.addEventListener("keydown", function(e) {
        // F12
        if (e.key === "F12") {
            e.preventDefault();
        }
        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
            e.preventDefault();
        }
        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
            e.preventDefault();
        }
        // Ctrl+U
        if (e.ctrlKey && e.key.toLowerCase() === "u") {
            e.preventDefault();
        }
        // Ctrl+S (optional)
        if (e.ctrlKey && e.key.toLowerCase() === "s") {
            e.preventDefault();
        }
    });

    // Optional: try to detect DevTools open
    setInterval(function () {
        if (window.outerHeight - window.innerHeight > 150 || window.outerWidth - window.innerWidth > 150) {
            document.body.innerHTML = "<h1 style='color:red;text-align:center;'>DevTools are not allowed!</h1>";
        }
    }, 1000);
</script>
